# ============================================================
#  Egg Smash Adventures â€” Smoke Tests
#  Runs against production twice daily and on every push to main.
#
#  Required GitHub secrets (Settings â†’ Secrets â†’ Actions):
#
#    SUPABASE_SERVICE_ROLE_KEY
#      Supabase dashboard â†’ Project Settings â†’ API â†’ service_role key.
#      Enables DB-write tests (cloud save round-trip, push cleanup).
#      Tests that need it are automatically skipped when absent.
#
#    MAIL_USERNAME
#      Gmail address to send failure alerts from.
#      e.g. yourname@gmail.com
#
#    MAIL_PASSWORD
#      Gmail App Password (NOT your real Gmail password).
#      Enable 2-Step Verification first, then:
#      Google Account â†’ Security â†’ 2-Step Verification â†’ App Passwords â†’ create one.
#
#  Both MAIL_* secrets are optional. Without them, the alert email step
#  silently skips â€” you'll still see the failure in GitHub's UI and get
#  GitHub's own notification emails (if enabled in your account settings).
# ============================================================

name: Smoke Tests

on:
  schedule:
    - cron: '0 8 * * *'    # 08:00 UTC daily
    - cron: '0 20 * * *'   # 20:00 UTC daily
  push:
    branches: [main]        # also run on every deploy
  workflow_dispatch:        # manual trigger from Actions UI

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Wait for Vercel deployment
        if: github.event_name == 'push'
        run: |
          EXPECTED=$(grep "const VERSION" config.js | grep -o "'[^']*'" | tr -d "'")
          echo "Waiting for production to reach v$EXPECTED or newer â€¦"
          ver_patch() { echo "$1" | cut -d. -f3; }
          EXPECTED_PATCH=$(ver_patch "$EXPECTED")
          for i in $(seq 1 18); do
            LIVE=$(curl -sf https://egg-breaker-adventures.vercel.app/sw.js | grep -o "CACHE_VERSION = '[^']*'" | grep -o "'[^']*'" | tr -d "'" || echo "err")
            BUNDLE=$(curl -sf https://egg-breaker-adventures.vercel.app/bundle.min.js | grep -o 'VERSION="[^"]*"' | grep -o '"[^"]*"' | tr -d '"' || echo "err")
            echo "  attempt $i: sw.js=$LIVE bundle.min.js=$BUNDLE expected=$EXPECTED"
            LIVE_PATCH=$(ver_patch "$LIVE")
            BUNDLE_PATCH=$(ver_patch "$BUNDLE")
            if echo "$LIVE_PATCH" | grep -qE '^[0-9]+$' && [ "$LIVE_PATCH" -ge "$EXPECTED_PATCH" ] && \
               echo "$BUNDLE_PATCH" | grep -qE '^[0-9]+$' && [ "$BUNDLE_PATCH" -ge "$EXPECTED_PATCH" ]; then
              echo "Deployment ready (sw.js=$LIVE bundle.min.js=$BUNDLE)." && exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for deployment." && exit 1

      - name: Run smoke tests
        run: node --test tests/smoke.test.js
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Send failure alert email
        if: failure() && env.MAIL_USERNAME != ''
        continue-on-error: true   # don't let a misconfigured mailer hide the real failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Smoke tests FAILED â€” Egg Smash Adventures"
          body: |
            One or more smoke tests failed.

            â†’ ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Triggered by : ${{ github.event_name }}
            Branch       : ${{ github.ref_name }}
            Started at   : ${{ github.run_started_at }}
          to: yotam@exacti.us
          from: ${{ secrets.MAIL_USERNAME }}
