<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egg Breaker Adventures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🥚</text></svg>">
</head>
<body>
  <div id="app">

    <!-- ===== Top bar ===== -->
    <div class="top-bar">
      <div class="title-row">
        <div class="monkey-avatar" id="monkey-avatar">🐵</div>
        <div class="title-text">
          <h1>Egg Breaker Adventures</h1>
          <p class="subtitle" id="monkey-subtitle">Mr. Monkey</p>
        </div>
        <button class="icon-btn" id="sound-btn" onclick="toggleSound()" title="Toggle sound">🔊</button>
      </div>
      <div class="resource-bar">
        <div class="res" data-tip="Hammers — spent to break eggs. Normal costs 1, Silver 2, Gold 3. Regenerates over time."><span>🔨</span><strong id="res-h">40</strong></div>
        <div class="res" data-tip="Gold — main currency. Buy equipment, supplies, and upgrades in the shop."><span>🪙</span><strong id="res-g">0</strong></div>
        <div class="res star-res" data-tip="Star Pieces — collect 5 to trigger Starfall, which breaks all remaining eggs for free!"><span>⭐</span><strong id="res-s">0/5</strong></div>
        <div class="res" data-tip="Crystal Bananas — earned by completing stages. Spend 9 to unlock a new monkey."><span>🍌</span><strong id="res-b">0</strong></div>
        <div class="res" data-tip="Feathers — bonus collectible currency found inside eggs."><span>🪶</span><strong id="res-f">0</strong></div>
      </div>
    </div>

    <!-- ===== Overall progress ===== -->
    <div class="overall-prog" id="overall-prog" data-tip="">
      <div class="overall-header">
        <span class="overall-label">Overall Progress</span>
        <span class="overall-pct" id="overall-pct">0%</span>
      </div>
      <div class="overall-track"><div class="overall-fill" id="overall-fill"></div></div>
      <div class="overall-detail" id="overall-detail"></div>
    </div>

    <!-- ===== Nav tabs ===== -->
    <nav class="nav-tabs" id="nav-tabs">
      <button class="nav-tab active" data-tab="play">Play</button>
      <button class="nav-tab" data-tab="album">Album</button>
      <button class="nav-tab" data-tab="monkeys">Monkeys</button>
      <button class="nav-tab" data-tab="shop">Shop</button>
      <button class="nav-tab" data-tab="stats">Stats</button>
      <button class="nav-tab" data-tab="lexicon">Lexicon</button>
    </nav>

    <!-- ===== PLAY TAB ===== -->
    <section class="tab-panel active" id="panel-play">
      <!-- Stage info -->
      <div class="stage-bar">
        <div class="stage-header">
          <span class="stage-name" id="stage-name">Stage 1: Tropical Paradise</span>
          <span class="stage-tier" id="stage-tier">Bronze</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="stage-fill"></div></div>
        <span class="stage-detail" id="stage-detail">0/5 items</span>
      </div>

      <!-- Multiplier queue -->
      <div class="mult-bar" id="mult-bar">
        <span class="mult-label">Active: <strong id="active-mult">x1</strong></span>
        <div class="mult-queue" id="mult-queue"></div>
      </div>

      <!-- Egg tray -->
      <div class="egg-tray-wrap" id="egg-tray-wrap">
        <canvas id="particle-canvas"></canvas>
        <div class="egg-tray" id="egg-tray"></div>
        <div id="prize-zone"></div>
        <p class="hint" id="hint-txt">Click an egg to smash it!</p>
      </div>

      <!-- Action row -->
      <div class="action-row">
        <button class="action-btn" id="star-btn" onclick="useStarfall()" disabled>⭐ Starfall <span id="star-lbl">(0/5)</span></button>
        <button class="action-btn primary" id="round-btn" onclick="newRound()">Refresh Eggs</button>
      </div>

      <!-- Status & daily -->
      <div class="status-row">
        <span id="regen-txt"></span>
        <span id="status-txt"></span>
      </div>
      <div class="daily-box" id="daily-box">
        <span>📅 Day <strong id="daily-day">1</strong> streak</span>
        <span class="daily-detail" id="daily-detail">+40 hammers</span>
        <button class="daily-btn" id="daily-btn" onclick="claimDaily()">Claim!</button>
      </div>
    </section>

    <!-- ===== ALBUM TAB ===== -->
    <section class="tab-panel" id="panel-album">
      <div class="album-stages" id="album-stages"></div>
      <div class="album-items" id="album-items"></div>
    </section>

    <!-- ===== MONKEYS TAB ===== -->
    <section class="tab-panel" id="panel-monkeys">
      <div class="monkey-grid" id="monkey-grid"></div>
    </section>

    <!-- ===== SHOP TAB ===== -->
    <section class="tab-panel" id="panel-shop">
      <h3 class="section-title">Special Hammers</h3>
      <div class="shop-grid" id="shop-hammers"></div>
      <h3 class="section-title">Hats</h3>
      <div class="shop-grid" id="shop-hats"></div>
      <h3 class="section-title">Supplies</h3>
      <div class="shop-grid" id="shop-supplies"></div>
    </section>

    <!-- ===== STATS TAB ===== -->
    <section class="tab-panel" id="panel-stats">
      <h3 class="section-title">Lifetime Stats</h3>
      <div class="life-stats" id="life-stats"></div>
      <h3 class="section-title">Achievements</h3>
      <div class="achieve-grid" id="achieve-grid"></div>
      <button class="reset-btn" onclick="resetGame()">Reset All Progress</button>
    </section>

    <!-- ===== LEXICON TAB ===== -->
    <section class="tab-panel" id="panel-lexicon">
      <div class="lex-content" id="lex-content"></div>
    </section>

    <!-- ===== POPUPS ===== -->
    <div class="overlay hidden" id="overlay-item">
      <div class="popup pop-item">
        <div class="pop-icon" id="pop-item-icon"></div>
        <strong id="pop-item-name"></strong>
        <span class="pop-sub">New collection item found!</span>
        <button class="pop-btn" onclick="closeOverlay('overlay-item')">Nice!</button>
      </div>
    </div>

    <div class="overlay hidden" id="overlay-stage">
      <div class="popup pop-stage">
        <div class="pop-icon">🎉</div>
        <strong id="pop-stage-title"></strong>
        <span class="pop-sub" id="pop-stage-detail"></span>
        <button class="pop-btn" onclick="closeOverlay('overlay-stage')">Continue!</button>
      </div>
    </div>

    <div class="overlay hidden" id="overlay-levelup">
      <div class="popup pop-levelup">
        <div class="pop-icon spin">⭐</div>
        <strong id="pop-level-title"></strong>
        <span class="pop-sub" id="pop-level-detail"></span>
        <button class="pop-btn" onclick="closeOverlay('overlay-levelup')">Let's go!</button>
      </div>
    </div>

    <div class="toast hidden" id="toast-achieve">
      <span id="toast-icon"></span>
      <div><strong id="toast-name"></strong><br><small id="toast-desc"></small></div>
    </div>

  </div>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
