<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESA Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a18; color: #e0e0e0; padding: 24px; }
  h1 { color: #f5c542; margin-bottom: 16px; font-size: 1.4rem; }
  #login { max-width: 360px; margin: 80px auto; }
  #login input { width: 100%; padding: 10px 14px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-size: 1rem; margin-bottom: 10px; }
  #login button { width: 100%; padding: 10px; background: #f5c542; color: #0a0a18; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 1rem; }
  #panel { display: none; }

  /* Tabs */
  .tab-nav { display: flex; gap: 6px; margin-bottom: 20px; }
  .tab-btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 600; background: #1a1a30; color: #7f8c8d; transition: background 0.15s; }
  .tab-btn.active { background: #f5c542; color: #0a0a18; }
  .tab-btn:hover:not(.active) { background: #2a2a4a; color: #e0e0e0; }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .toolbar input { padding: 8px 12px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-size: 0.9rem; width: 260px; }
  .toolbar span { color: #7f8c8d; font-size: 0.85rem; }

  /* Buttons */
  .btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  .btn-refresh { background: #2a2a4a; color: #e0e0e0; }
  .btn-delete  { background: #c0392b; color: #fff; }
  .btn-delete:hover  { background: #e74c3c; }
  .btn-disable { background: #7f8c8d; color: #fff; }
  .btn-disable:hover { background: #95a5a6; }
  .btn-enable  { background: #27ae60; color: #fff; }
  .btn-enable:hover  { background: #2ecc71; }

  /* Purchases table */
  tr.disabled-row td { opacity: 0.45; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: #16213e; color: #f5c542; padding: 10px 12px; text-align: left; position: sticky; top: 0; }
  td { padding: 9px 12px; border-bottom: 1px solid #1a1a30; vertical-align: middle; }
  tr:hover td { background: #111128; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
  .tag-completed { background: #1a4a2a; color: #2ecc71; }
  .tag-pending { background: #4a3a1a; color: #f5c542; }
  .tag-play { background: #1a3a4a; color: #3498db; }
  .tag-paypal { background: #2a1a4a; color: #9b59b6; }
  .mono { font-family: monospace; font-size: 0.8rem; color: #aaa; }
  .empty { color: #555; font-style: italic; }

  /* Player cards */
  .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .player-card { background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 16px; }
  .player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .player-email { color: #f5c542; font-weight: 700; font-size: 0.9rem; }
  .player-seen { color: #7f8c8d; font-size: 0.78rem; white-space: nowrap; margin-left: 8px; }
  .player-location { background: #0f1a30; border-radius: 6px; padding: 7px 10px; font-size: 0.82rem; color: #b0b0c0; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .player-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .pstat { background: #0f1a30; border-radius: 6px; padding: 7px 10px; }
  .pstat-label { color: #7f8c8d; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
  .pstat-val { color: #e0e0e0; font-size: 0.9rem; font-weight: 600; }
  .pstat-sub { color: #7f8c8d; font-size: 0.75rem; font-weight: 400; }
  .no-cloud { color: #555; font-style: italic; font-size: 0.85rem; padding: 6px 0; }
  .tier-pill { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 0.72rem; font-weight: 700; }
  .tier-0 { background: #3a2010; color: #d97706; }
  .tier-1 { background: #1a2a3a; color: #94a3b8; }
  .tier-2 { background: #2a2a10; color: #f5c542; }
  .tier-3 { background: #102a18; color: #2ecc71; }

  /* Analytics tab */
  .analytics-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .analytics-toolbar input { padding: 7px 12px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-size: 0.85rem; width: 280px; }
  .range-btn { padding: 6px 14px; border: 1px solid #2a2a4a; border-radius: 5px; background: #1a1a30; color: #7f8c8d; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
  .range-btn.active { background: #f5c542; color: #0a0a18; border-color: #f5c542; }
  .stats-cards { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 14px 20px; min-width: 130px; flex: 1; }
  .stat-card-label { color: #7f8c8d; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-card-val { color: #f5c542; font-size: 1.5rem; font-weight: 700; }
  .stat-card-sub { color: #555; font-size: 0.78rem; margin-top: 2px; }
  .analytics-section-title { color: #f5c542; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  #umami-events-table th { background: #16213e; }
  .event-bar-wrap { background: #1a1a30; border-radius: 3px; height: 6px; margin-top: 4px; }
  .event-bar { height: 6px; border-radius: 3px; background: #f5c542; }
  #umami-events-table tbody tr { cursor: pointer; }
  #umami-events-table tbody tr:hover td { background: #1e2a40; }
  #umami-events-table tbody tr.selected td { background: #1a2e4a; border-left: 3px solid #f5c542; }
  /* Event detail drawer */
  #event-detail-drawer { display:none; margin-top: 4px; background: #111828; border: 1px solid #2a2a4a; border-radius: 8px; padding: 16px 20px; }
  #event-detail-drawer.open { display: block; }
  .drawer-title { color: #f5c542; font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .drawer-close { background: none; border: none; color: #555; cursor: pointer; font-size: 1.1rem; padding: 0; line-height: 1; }
  .drawer-close:hover { color: #e0e0e0; }
  .prop-breakdown { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
  .prop-group { background: #16213e; border-radius: 6px; padding: 10px 14px; min-width: 140px; }
  .prop-group-name { color: #7f8c8d; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .prop-value-row { display: flex; justify-content: space-between; gap: 12px; font-size: 0.82rem; padding: 2px 0; }
  .prop-value-name { color: #e0e0e0; }
  .prop-value-count { color: #f5c542; font-weight: 600; }
  .instances-title { color: #7f8c8d; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 8px; }
  #instances-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  #instances-table th { background: #16213e; color: #7f8c8d; padding: 6px 10px; text-align: left; font-weight: 600; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.04em; }
  #instances-table td { padding: 6px 10px; border-bottom: 1px solid #1a1a30; vertical-align: top; }
  #instances-table tr:last-child td { border-bottom: none; }
  .prop-chip { display: inline-block; background: #1a2a3a; border-radius: 4px; padding: 1px 6px; font-size: 0.74rem; color: #93c5fd; margin: 1px; white-space: nowrap; }
  .prop-chip-key { color: #7f8c8d; }
  .drawer-loading { color: #555; font-style: italic; font-size: 0.85rem; padding: 12px 0; }

  /* Toast & confirm */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #2ecc71; color: #0a0a18; padding: 10px 18px; border-radius: 8px; font-weight: 600; display: none; }
  #confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  #confirm-overlay.show { display: flex; }
  #confirm-box { background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 28px 32px; max-width: 400px; width: 90%; }
  #confirm-box h2 { color: #e74c3c; margin-bottom: 12px; font-size: 1.1rem; }
  #confirm-box p { color: #b0b0c0; font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; }
  #confirm-box .actions { display: flex; gap: 10px; justify-content: flex-end; }
  #confirm-box .btn-cancel { background: #2a2a4a; color: #e0e0e0; }
</style>
</head>
<body>

<div id="login">
  <h1>ESA Admin</h1>
  <input type="password" id="secret-input" placeholder="Admin secret" autofocus>
  <button onclick="doLogin()">Sign in</button>
</div>

<div id="panel">
  <h1>ESA Admin</h1>
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="purchases" onclick="showTab('purchases')">💳 Purchases</button>
    <button class="tab-btn" data-tab="players" onclick="showTab('players')">👥 Players</button>
    <button class="tab-btn" data-tab="analytics" onclick="showTab('analytics')">📊 Analytics</button>
  </div>

  <!-- Purchases tab -->
  <div id="tab-purchases">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search email, device, product…" oninput="renderTable()" autocomplete="off">
      <button class="btn btn-refresh" onclick="load()">Refresh</button>
      <button class="btn btn-disable" onclick="showResetMenu()">Reset Premium Cache…</button>
      <span id="count"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Product</th>
          <th>Source</th>
          <th>Status</th>
          <th>Device ID</th>
          <th>Order ID</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- Analytics tab -->
  <div id="tab-analytics" style="display:none">
    <div class="analytics-toolbar">
      <input type="password" id="umami-token" placeholder="Umami API token (from cloud.umami.is → Settings → API Keys)" autocomplete="off">
      <button class="range-btn active" data-range="7"  onclick="setRange(7)">7d</button>
      <button class="range-btn"        data-range="30" onclick="setRange(30)">30d</button>
      <button class="range-btn"        data-range="90" onclick="setRange(90)">90d</button>
      <button class="btn btn-refresh"  onclick="loadAnalytics()">Load</button>
      <span id="analytics-status" style="color:#7f8c8d;font-size:0.82rem"></span>
    </div>

    <div class="stats-cards" id="umami-stats-cards">
      <div class="stat-card"><div class="stat-card-label">Unique Visitors</div><div class="stat-card-val" id="um-visitors">—</div></div>
      <div class="stat-card"><div class="stat-card-label">Page Views</div><div class="stat-card-val" id="um-pageviews">—</div></div>
      <div class="stat-card"><div class="stat-card-label">Sessions</div><div class="stat-card-val" id="um-visits">—</div></div>
      <div class="stat-card"><div class="stat-card-label">Avg Session</div><div class="stat-card-val" id="um-duration">—</div><div class="stat-card-sub" id="um-bounce"></div></div>
    </div>

    <div class="analytics-section-title">Custom Events</div>
    <table id="umami-events-table">
      <thead>
        <tr>
          <th>Event</th>
          <th style="text-align:right;width:80px">Count</th>
          <th style="width:220px"></th>
        </tr>
      </thead>
      <tbody id="umami-events-tbody"><tr><td colspan="3" class="empty">Load data above</td></tr></tbody>
    </table>

    <!-- Event detail drawer -->
    <div id="event-detail-drawer">
      <div class="drawer-title">
        <span id="drawer-event-name">Event Details</span>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>
      <div id="drawer-content"><div class="drawer-loading">Loading…</div></div>
    </div>
  </div>

  <!-- Players tab -->
  <div id="tab-players" style="display:none">
    <div class="toolbar">
      <input type="text" id="player-search" placeholder="Search email…" oninput="renderPlayers()" autocomplete="off">
      <button class="btn btn-refresh" onclick="loadPlayers()">Refresh</button>
      <span id="player-count"></span>
    </div>
    <div id="players-grid" class="player-grid"></div>
  </div>
</div>

<div id="toast"></div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <h2>Delete purchase?</h2>
    <p id="confirm-msg"></p>
    <div class="actions">
      <button class="btn btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-delete" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_FN         = 'https://hhpikvqeopscjdzuhbfk.supabase.co/functions/v1/admin-purchases'
const ADMIN_PLAYERS_FN    = 'https://hhpikvqeopscjdzuhbfk.supabase.co/functions/v1/admin-players'
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhocGlrdnFlb3BzY2pkenVoYmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzA2NDUsImV4cCI6MjA5MTcwNjY0NX0.-iYI6Wf8eREEBKFxfty7ot1Ke8AqjC73xlT7KCTZaqc'
let secret = ''
let allRows = []
let allPlayers = []

function authHeaders(extra) {
  return { Authorization: `Bearer ${ANON_KEY}`, apikey: ANON_KEY, 'x-admin-secret': secret, ...extra }
}

function doLogin() {
  secret = document.getElementById('secret-input').value.trim()
  if (!secret) return
  sessionStorage.setItem('eba_admin_secret', secret)
  document.getElementById('login').style.display = 'none'
  document.getElementById('panel').style.display = 'block'
  showTab('purchases')
  load()
}

// ── Tab switching ────────────────────────────────────────────────────────────
function showTab(name) {
  document.getElementById('tab-purchases').style.display = name === 'purchases' ? '' : 'none'
  document.getElementById('tab-players').style.display   = name === 'players'   ? '' : 'none'
  document.getElementById('tab-analytics').style.display = name === 'analytics' ? '' : 'none'
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name))
  if (name === 'players'   && !allPlayers.length) loadPlayers()
  if (name === 'analytics') restoreUmamiToken()
}

// ── Purchases tab ────────────────────────────────────────────────────────────
async function load() {
  const res = await fetch(SUPABASE_FN, { headers: authHeaders() })
  if (res.status === 401) { sessionStorage.removeItem('eba_admin_secret'); alert('Wrong secret'); return }
  allRows = await res.json()
  renderTable()
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase()
  const rows = allRows.filter(r =>
    !q ||
    (r.email ?? '').toLowerCase().includes(q) ||
    (r.device_id ?? '').toLowerCase().includes(q) ||
    (r.product_id ?? '').toLowerCase().includes(q) ||
    (r.order_id ?? '').toLowerCase().includes(q)
  )
  document.getElementById('count').textContent = `${rows.length} of ${allRows.length} rows`
  const tbody = document.getElementById('tbody')
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No results</td></tr>'
    return
  }
  tbody.innerHTML = rows.map(r => `
    <tr class="${r.disabled ? 'disabled-row' : ''}">
      <td>${r.email ? `<strong>${esc(r.email)}</strong>` : '<span class="empty">—</span>'}</td>
      <td><strong>${esc(r.product_id)}</strong></td>
      <td><span class="tag tag-${r.source}">${esc(r.source)}</span></td>
      <td><span class="tag tag-${r.status}">${esc(r.status)}</span></td>
      <td class="mono">${esc(r.device_id ?? '—')}</td>
      <td class="mono">${r.order_id ? esc(r.order_id.slice(0,20)) + '…' : '—'}</td>
      <td>${new Date(r.created_at).toLocaleDateString()}</td>
      <td style="display:flex;gap:6px">
        <button class="btn ${r.disabled ? 'btn-enable' : 'btn-disable'}" onclick="toggleDisabled('${r.id}','${r.source}',${!r.disabled})">${r.disabled ? 'Enable' : 'Disable'}</button>
        <button class="btn btn-delete" onclick="deletePurchase('${r.id}','${r.source}')">Delete</button>
      </td>
    </tr>
  `).join('')
}

function showResetMenu() {
  const users = [...new Map(allRows.filter(r => r.user_id).map(r => [r.user_id, r.email ?? r.user_id])).entries()]
  if (!users.length) { alert('No signed-in users found in the table.'); return }
  const choice = users.length === 1
    ? users[0]
    : users[parseInt(prompt(users.map((u, i) => `${i}: ${u[1]}`).join('\n') + '\n\nEnter number:'), 10)]
  if (!choice) return
  if (!confirm(`Reset premium cache for ${choice[1]}?\nTheir device will clear PREMIUM_KEY on next app open.`)) return
  resetPremiumCache(choice[0], choice[1])
}

async function resetPremiumCache(userId, label) {
  const res = await fetch(SUPABASE_FN, {
    method: 'POST',
    headers: authHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify({ user_id: userId }),
  })
  const data = await res.json()
  if (!data.ok) { alert('Error: ' + data.error); return }
  toast(`Reset queued for ${label}`)
}

async function toggleDisabled(id, source, disabled) {
  const res = await fetch(SUPABASE_FN, {
    method: 'PATCH',
    headers: authHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify({ id, source, disabled }),
  })
  const data = await res.json()
  if (!data.ok) { alert('Error: ' + data.error); return }
  const row = allRows.find(r => r.id === id)
  if (row) row.disabled = disabled
  renderTable()
  toast(disabled ? 'Disabled' : 'Enabled')
}

let _confirmResolve = null
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show')
  if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null }
}
function openConfirm(msg) {
  return new Promise(resolve => {
    _confirmResolve = resolve
    document.getElementById('confirm-msg').textContent = msg
    document.getElementById('confirm-ok').onclick = () => {
      document.getElementById('confirm-overlay').classList.remove('show')
      _confirmResolve = null
      resolve(true)
    }
    document.getElementById('confirm-overlay').classList.add('show')
  })
}

async function deletePurchase(id, source) {
  const row = allRows.find(r => r.id === id)
  const label = row ? `${row.product_id} (${row.email ?? row.device_id ?? 'unknown'})` : id
  const confirmed = await openConfirm(`Permanently delete "${label}"?\n\nThis cannot be undone. The user will lose this item on their next restore.`)
  if (!confirmed) return
  const res = await fetch(SUPABASE_FN, {
    method: 'DELETE',
    headers: authHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify({ id, source }),
  })
  const data = await res.json()
  if (!data.ok) { alert('Error: ' + data.error); return }
  allRows = allRows.filter(r => r.id !== id)
  renderTable()
  toast('Deleted')
}

// ── Players tab ──────────────────────────────────────────────────────────────
async function loadPlayers() {
  document.getElementById('player-count').textContent = 'Loading…'
  document.getElementById('players-grid').innerHTML = ''
  const res = await fetch(ADMIN_PLAYERS_FN, { headers: authHeaders() })
  if (res.status === 401) { alert('Wrong secret'); return }
  allPlayers = await res.json()
  renderPlayers()
}

function renderPlayers() {
  const q = document.getElementById('player-search').value.toLowerCase()
  const filtered = allPlayers.filter(p => !q || (p.email || '').toLowerCase().includes(q) || (p.user_id || '').toLowerCase().includes(q))
  document.getElementById('player-count').textContent = filtered.length + ' of ' + allPlayers.length + ' players'
  const grid = document.getElementById('players-grid')
  if (!filtered.length) { grid.innerHTML = '<div class="empty" style="padding:20px">No players found</div>'; return }
  grid.innerHTML = filtered.map(p => playerCard(p)).join('')
}

const TIER_NAMES  = ['Bronze', 'Silver', 'Gold', '✅ Done']
const TIER_CLASSES = ['tier-0', 'tier-1', 'tier-2', 'tier-3']

function playerCard(p) {
  const emailLabel = p.email ? esc(p.email) : '<span style="color:#555">' + esc(p.user_id.slice(0, 12)) + '…</span>'
  const seen = timeAgo(p.last_seen_at)

  if (!p.stats) {
    return `<div class="player-card">
      <div class="player-header">
        <span class="player-email">${emailLabel}</span>
        <span class="player-seen">${seen}</span>
      </div>
      <div class="no-cloud">No cloud save data</div>
    </div>`
  }

  const s = p.stats
  const tier = Math.min(3, s.monkeyTier)
  const shopLine = [
    s.ownedHammers ? s.ownedHammers + ' 🔨' : '',
    s.ownedHats    ? s.ownedHats    + ' 🎩' : '',
    s.fastRegen    ? '⚡' : '',
    s.owned_spyglass ? '🔍' : '',
  ].filter(Boolean).join(' ') || '—'

  const premiumLine = s.premium_starter_pack
    ? (s.premiumPurchases > 0 ? s.premiumPurchases + ' + pack' : 'Starter Pack')
    : s.premiumPurchases > 0 ? String(s.premiumPurchases) : '—'

  return `<div class="player-card">
    <div class="player-header">
      <span class="player-email">${emailLabel}</span>
      <span class="player-seen">${seen}</span>
    </div>
    <div class="player-location">
      ${s.monkeyEmoji} ${esc(s.monkeyName)} · Stage ${s.monkeyStage}

      </div>
      <div class="pstat">

      </div>

// ── Helpers ──────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return '—'
  const diff = (Date.now() - new Date(ts).getTime()) / 1000
  if (diff < 60)     return 'just now'
  if (diff < 3600)   return Math.floor(diff / 60)    + 'm ago'
  if (diff < 86400)  return Math.floor(diff / 3600)  + 'h ago'
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago'
  return new Date(ts).toLocaleDateString()
}

function fmtTime(secs) {
  if (!secs) return '—'
  const h = Math.floor(secs / 3600)
  const m = Math.floor((secs % 3600) / 60)
  if (h > 0) return h + 'h ' + m + 'm'
  if (m > 0) return m + 'm'
  return secs + 's'
}

function fmt(n) {
  if (!n) return '0'
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M'
  if (n >= 1000)    return (n / 1000).toFixed(1).replace(/\.0$/, '')    + 'k'
  return String(n)
}

function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.style.display = 'block'
  setTimeout(() => el.style.display = 'none', 2000)
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

// ── Analytics tab (Umami Cloud) ───────────────────────────────────────────────
const UMAMI_BASE    = 'https://api.umami.is/v1'
const UMAMI_SITE_ID = '343bb5db-6668-469d-a99c-9b6fcaa1c45a'
let _umamiRange = 7

function restoreUmamiToken() {
  const saved = sessionStorage.getItem('eba_umami_token')
  if (saved) document.getElementById('umami-token').value = saved
}

function setRange(days) {
  _umamiRange = days
  document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('active', +b.dataset.range === days))
}

async function loadAnalytics() {
  const token = document.getElementById('umami-token').value.trim()
  if (!token) { alert('Paste your Umami API token first.\nGet it from cloud.umami.is → Settings → API Keys.'); return }
  sessionStorage.setItem('eba_umami_token', token)

  closeDrawer()
  const status = document.getElementById('analytics-status')
  status.textContent = 'Loading…'

  const now      = Date.now()
  const startAt  = now - _umamiRange * 86400 * 1000
  const headers  = { 'x-umami-api-key': token }
  const qp       = `?startAt=${startAt}&endAt=${now}`

  // Human-readable labels for known game events
  const EVENT_LABELS = {
    'cloud-save':        '☁️ Cloud save',
    'shop-purchase':     '🛒 Shop purchase',
    'premium-purchase':  '💎 Premium purchase',
    'daily-claim':       '📅 Daily reward claimed',
    'stage-complete':    '🏆 Stage completed',
    'monkey-unlock':     '🐒 Monkey unlocked',
  }

  try {
    const [statsRes, eventsRes] = await Promise.all([
      fetch(`${UMAMI_BASE}/websites/${UMAMI_SITE_ID}/stats${qp}`, { headers }),
      fetch(`${UMAMI_BASE}/websites/${UMAMI_SITE_ID}/metrics?type=event&${qp.slice(1)}`, { headers }),
    ])

    if (statsRes.status === 401 || eventsRes.status === 401) {
      status.textContent = `401 — invalid token (stats:${statsRes.status} events:${eventsRes.status})`
      return
    }
    if (!statsRes.ok || !eventsRes.ok) {
      status.textContent = `Error — stats:${statsRes.status} events:${eventsRes.status}`
      return
    }

    const stats  = await statsRes.json()
    const events = await eventsRes.json()

    // Stats cards
    document.getElementById('um-visitors').textContent  = fmt(stats.visitors?.value  ?? 0)
    document.getElementById('um-pageviews').textContent = fmt(stats.pageviews?.value ?? 0)
    document.getElementById('um-visits').textContent    = fmt(stats.visits?.value    ?? 0)
    const avgSec = stats.totaltime?.value && stats.visits?.value
      ? Math.round(stats.totaltime.value / stats.visits.value)
      : 0
    document.getElementById('um-duration').textContent = avgSec ? fmtTime(avgSec) : '—'
    const bounceRate = stats.bounces?.value && stats.visits?.value
      ? Math.round(stats.bounces.value / stats.visits.value * 100)
      : null
    document.getElementById('um-bounce').textContent = bounceRate !== null ? bounceRate + '% bounce' : ''

    // Events table — /metrics?type=event returns [{x: "event-name", y: count}]
    const rows = (Array.isArray(events) ? events : (events.data ?? []))
      .filter(r => (r.y ?? r.count ?? 0) > 0)
      .sort((a, b) => (b.y ?? b.count ?? 0) - (a.y ?? a.count ?? 0))
    const max = rows[0] ? (rows[0].y ?? rows[0].count ?? 1) : 1
    const tbody = document.getElementById('umami-events-tbody')
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">No custom events in this period</td></tr>'
    } else {
      tbody.innerHTML = rows.map(r => {
        const key   = r.x ?? r.eventName ?? r.event_name ?? '—'
        const count = r.y ?? r.count ?? 0
        const label = EVENT_LABELS[key] || key
        return `<tr data-event="${esc(key)}" onclick="clickEventRow('${esc(key)}')">
          <td><strong>${esc(label)}</strong><br><span style="color:#555;font-size:0.78rem">${esc(key)}</span></td>
          <td style="text-align:right;color:#f5c542;font-weight:700;white-space:nowrap">${fmt(count)}</td>
          <td>
            <div class="event-bar-wrap">
              <div class="event-bar" style="width:${Math.round((count / max) * 100)}%"></div>
            </div>
          </td>
        </tr>`
      }).join('')
    }

    status.textContent = 'Updated ' + new Date().toLocaleTimeString()
  } catch (e) {
    status.textContent = 'Error: ' + e.message
  }
}

// ── Event drill-down ─────────────────────────────────────────────────────────
let _selectedEvent = null

function closeDrawer() {
  document.getElementById('event-detail-drawer').classList.remove('open')
  document.querySelectorAll('#umami-events-tbody tr').forEach(r => r.classList.remove('selected'))
  _selectedEvent = null
}

async function clickEventRow(eventKey) {
  if (_selectedEvent === eventKey) { closeDrawer(); return }
  _selectedEvent = eventKey

  document.querySelectorAll('#umami-events-tbody tr').forEach(r =>
    r.classList.toggle('selected', r.dataset.event === eventKey)
  )

  const drawer  = document.getElementById('event-detail-drawer')
  const content = document.getElementById('drawer-content')
  document.getElementById('drawer-event-name').textContent = eventKey
  content.innerHTML = '<div class="drawer-loading">Loading…</div>'
  drawer.classList.add('open')
  drawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' })

  const token   = sessionStorage.getItem('eba_umami_token')
  const now     = Date.now()
  const startAt = now - _umamiRange * 86400 * 1000
  const headers = { 'x-umami-api-key': token }
  const base    = `${UMAMI_BASE}/websites/${UMAMI_SITE_ID}`

  try {
    const res = await fetch(
      `${base}/event-data/events?startAt=${startAt}&endAt=${now}&eventName=${encodeURIComponent(eventKey)}&pageSize=500`,
      { headers }
    )
    if (!res.ok) { content.innerHTML = `<div class="drawer-loading">Error ${res.status}</div>`; return }
    const body = await res.json()
    const rows = body.data ?? (Array.isArray(body) ? body : [])

    if (!rows.length) {
      content.innerHTML = '<div class="drawer-loading">No event data found for this period.</div>'
      return
    }

    // Group by event id to reconstruct full instances (Umami returns one row per property key)
    const instances = new Map()
    for (const row of rows) {
      const id = row.id ?? (row.websiteEventId ?? (row.createdAt + '|' + row.dataKey))
      if (!instances.has(id)) {
        instances.set(id, {
          id,
          createdAt: row.createdAt,
          browser: row.browserName,
          os: row.osName,
          country: row.country,
          props: {}
        })
      }
      if (row.dataKey) {
        instances.get(id).props[row.dataKey] = row.stringValue ?? row.numberValue ?? row.dateValue ?? row.dataValue
      }
    }

    // Property value breakdown
    const breakdown = new Map()
    for (const inst of instances.values()) {
      for (const [k, v] of Object.entries(inst.props)) {
        if (!breakdown.has(k)) breakdown.set(k, new Map())
        const val = String(v ?? '—')
        breakdown.get(k).set(val, (breakdown.get(k).get(val) ?? 0) + 1)
      }
    }

    let html = ''

    if (breakdown.size) {
      html += '<div class="prop-breakdown">'
      for (const [key, vals] of breakdown.entries()) {
        html += `<div class="prop-group"><div class="prop-group-name">${esc(key)}</div>`
        const sorted = [...vals.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8)
        for (const [val, cnt] of sorted) {
          html += `<div class="prop-value-row"><span class="prop-value-name">${esc(val)}</span><span class="prop-value-count">${cnt}</span></div>`
        }
        html += '</div>'
      }
      html += '</div>'
    }

    const instList = [...instances.values()].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
    const SKIP_IN_CHIPS = new Set(['email', 'user_email', 'user_id', 'userId'])

    html += `<div class="instances-title">${instList.length} instances (newest first)</div>`
    html += `<table id="instances-table"><thead><tr>
      <th>Time</th><th>User</th><th>Device</th><th>Properties</th>
    </tr></thead><tbody>`

    for (const inst of instList) {
      const timeStr   = new Date(inst.createdAt).toLocaleString()
      const userEmail = inst.props.email ?? inst.props.user_email ?? ''
      const userId    = inst.props.user_id ?? inst.props.userId ?? ''
      const userCell  = userEmail
        ? `<strong>${esc(userEmail)}</strong>`
        : (userId ? `<span class="mono" style="font-size:0.76rem">${esc(userId.slice(0, 12))}…</span>` : '<span style="color:#555">—</span>')
      const device    = [inst.browser, inst.os, inst.country].filter(Boolean).join(' · ') || '—'
      const chips     = Object.entries(inst.props)
        .filter(([k]) => !SKIP_IN_CHIPS.has(k))
        .map(([k, v]) => `<span class="prop-chip"><span class="prop-chip-key">${esc(k)}:</span>${esc(String(v ?? ''))}</span>`)
        .join('')
      html += `<tr>
        <td style="white-space:nowrap;color:#93c5fd">${esc(timeStr)}</td>
        <td>${userCell}</td>
        <td style="color:#7f8c8d;font-size:0.78rem;white-space:nowrap">${esc(device)}</td>
        <td>${chips || '<span style="color:#555">—</span>'}</td>
      </tr>`
    }

    html += '</tbody></table>'
    content.innerHTML = html
  } catch (e) {
    content.innerHTML = `<div class="drawer-loading">Error: ${esc(e.message)}</div>`
  }
}

if (saved) { secret = saved; document.getElementById('secret-input').value = saved; doLogin() }
else document.getElementById('secret-input').focus()

document.getElementById('secret-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
