<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <pattern id="jungle" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- big leaf left -->
      <polygon points="4,72 4,20 20,4 28,20 20,40 28,72" fill="#2d7a2d"/>
      <polygon points="4,20 20,4 28,20 20,40" fill="#3d9e3d"/>
      <!-- banana cluster -->
      <ellipse cx="52" cy="14" rx="10" ry="4" fill="#f5c842" transform="rotate(-30 52 14)"/>
      <ellipse cx="60" cy="18" rx="10" ry="4" fill="#e8b830" transform="rotate(-15 60 18)"/>
      <ellipse cx="56" cy="24" rx="10" ry="4" fill="#f5c842" transform="rotate(5 56 24)"/>
      <!-- vine -->
      <line x1="38" y1="0" x2="34" y2="80" stroke="#4a8f2a" stroke-width="2"/>
      <!-- small leaf right -->
      <polygon points="64,50 72,36 80,44 76,58 68,62" fill="#2d7a2d"/>
      <polygon points="72,36 80,44 76,58" fill="#3d9e3d"/>
      <!-- ground dots -->
      <rect x="0" y="74" width="4" height="4" fill="#1a5c1a"/>
      <rect x="16" y="76" width="4" height="4" fill="#1a5c1a"/>
      <rect x="44" y="74" width="4" height="4" fill="#1a5c1a"/>
      <rect x="68" y="76" width="4" height="4" fill="#1a5c1a"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="#1a3d1a"/>
  <rect width="400" height="300" fill="url(#jungle)"/>
</svg>
