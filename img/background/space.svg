<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <pattern id="cosmos" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- stars scattered -->
      <rect x="4"  y="8"  width="2" height="2" fill="#ffffff"/>
      <rect x="18" y="22" width="2" height="2" fill="#cce4ff"/>
      <rect x="32" y="6"  width="2" height="2" fill="#ffffff"/>
      <rect x="46" y="18" width="2" height="2" fill="#ffe8a0"/>
      <rect x="60" y="4"  width="2" height="2" fill="#ffffff"/>
      <rect x="74" y="14" width="2" height="2" fill="#cce4ff"/>
      <rect x="88" y="8"  width="2" height="2" fill="#ffffff"/>
      <rect x="10" y="38" width="2" height="2" fill="#ffffff"/>
      <rect x="52" y="34" width="2" height="2" fill="#cce4ff"/>
      <rect x="82" y="30" width="2" height="2" fill="#ffe8a0"/>
      <rect x="24" y="56" width="2" height="2" fill="#ffffff"/>
      <rect x="66" y="52" width="2" height="2" fill="#ffffff"/>
      <rect x="92" y="48" width="2" height="2" fill="#cce4ff"/>
      <rect x="8"  y="70" width="2" height="2" fill="#ffffff"/>
      <rect x="38" y="74" width="2" height="2" fill="#ffe8a0"/>
      <rect x="76" y="68" width="2" height="2" fill="#ffffff"/>
      <rect x="14" y="88" width="2" height="2" fill="#cce4ff"/>
      <rect x="56" y="90" width="2" height="2" fill="#ffffff"/>
      <rect x="94" y="82" width="2" height="2" fill="#ffffff"/>
      <!-- big star (4-point) -->
      <rect x="44" y="60" width="2" height="8" fill="#ffe080"/>
      <rect x="41" y="63" width="8" height="2" fill="#ffe080"/>
      <!-- planet with ring -->
      <circle cx="74" cy="74" r="10" fill="#4a6fa5"/>
      <circle cx="74" cy="74" r="10" fill="none" stroke="#6a9fd8" stroke-width="1"/>
      <circle cx="74" cy="68" r="3"  fill="#7ab0e8" opacity="0.6"/>
      <ellipse cx="74" cy="74" rx="16" ry="4" fill="none" stroke="#a0c4f8" stroke-width="1.5" opacity="0.6"/>
      <!-- small moon -->
      <circle cx="20" cy="76" r="6"  fill="#b0b8c8"/>
      <circle cx="22" cy="74" r="2"  fill="#9098a8" opacity="0.6"/>
      <circle cx="18" cy="78" r="1.5" fill="#9098a8" opacity="0.4"/>
      <!-- shooting star -->
      <line x1="30" y1="18" x2="44" y2="32" stroke="#ffe8a0" stroke-width="1" opacity="0.7"/>
      <rect x="28" y="16" width="3" height="3" fill="#ffe8a0"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="#050a1a"/>
  <rect width="400" height="300" fill="url(#cosmos)"/>
</svg>
