<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <pattern id="royal" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- castle tower -->
      <rect x="2"  y="30" width="18" height="40" fill="#6a3d8a"/>
      <rect x="2"  y="24" width="4"  height="8"  fill="#6a3d8a"/>
      <rect x="10" y="24" width="4"  height="8"  fill="#6a3d8a"/>
      <rect x="18" y="24" width="4"  height="8"  fill="#6a3d8a"/>
      <!-- castle window -->
      <rect x="8" y="40" width="6" height="8" fill="#ffe08a" rx="3"/>
      <!-- large flower -->
      <circle cx="54" cy="30" r="6"  fill="#f472b6"/>
      <circle cx="54" cy="18" r="5"  fill="#f9a8d4"/>
      <circle cx="66" cy="30" r="5"  fill="#f9a8d4"/>
      <circle cx="54" cy="42" r="5"  fill="#f9a8d4"/>
      <circle cx="42" cy="30" r="5"  fill="#f9a8d4"/>
      <circle cx="54" cy="30" r="4"  fill="#fef08a"/>
      <!-- stem -->
      <line x1="54" y1="48" x2="54" y2="70" stroke="#4ade80" stroke-width="2"/>
      <ellipse cx="46" cy="58" rx="8" ry="4" fill="#4ade80" transform="rotate(-20 46 58)"/>
      <!-- small flower -->
      <circle cx="20" cy="10" r="4"  fill="#c084fc"/>
      <circle cx="20" cy="2"  r="3"  fill="#e9d5ff"/>
      <circle cx="28" cy="10" r="3"  fill="#e9d5ff"/>
      <circle cx="20" cy="18" r="3"  fill="#e9d5ff"/>
      <circle cx="12" cy="10" r="3"  fill="#e9d5ff"/>
      <circle cx="20" cy="10" r="3"  fill="#fef08a"/>
      <!-- sparkle -->
      <line x1="68" y1="60" x2="68" y2="68" stroke="#ffd700" stroke-width="1.5"/>
      <line x1="64" y1="64" x2="72" y2="64" stroke="#ffd700" stroke-width="1.5"/>
      <line x1="65" y1="61" x2="71" y2="67" stroke="#ffd700" stroke-width="1"/>
      <line x1="71" y1="61" x2="65" y2="67" stroke="#ffd700" stroke-width="1"/>
      <!-- heart -->
      <path d="M38,68 C38,65 34,62 34,66 C34,70 38,74 38,74 C38,74 42,70 42,66 C42,62 38,65 38,68Z" fill="#f472b6"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="#2d1a3d"/>
  <rect width="400" height="300" fill="url(#royal)"/>
</svg>
