<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <pattern id="gears" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- large gear -->
      <circle cx="30" cy="30" r="18" fill="none" stroke="#8b5e2a" stroke-width="4"/>
      <circle cx="30" cy="30" r="8" fill="#6b4010" stroke="#8b5e2a" stroke-width="2"/>
      <!-- gear teeth (large) -->
      <rect x="26" y="8"  width="8" height="6" fill="#8b5e2a"/>
      <rect x="26" y="48" width="8" height="6" fill="#8b5e2a"/>
      <rect x="8"  y="26" width="6" height="8" fill="#8b5e2a"/>
      <rect x="48" y="26" width="6" height="8" fill="#8b5e2a"/>
      <rect x="13" y="13" width="6" height="6" fill="#8b5e2a" transform="rotate(45 16 16)"/>
      <rect x="43" y="13" width="6" height="6" fill="#8b5e2a" transform="rotate(45 46 16)"/>
      <rect x="13" y="43" width="6" height="6" fill="#8b5e2a" transform="rotate(45 16 46)"/>
      <rect x="43" y="43" width="6" height="6" fill="#8b5e2a" transform="rotate(45 46 46)"/>
      <!-- small gear -->
      <circle cx="72" cy="22" r="12" fill="none" stroke="#c47820" stroke-width="3"/>
      <circle cx="72" cy="22" r="5"  fill="#8b4a10" stroke="#c47820" stroke-width="2"/>
      <rect x="68" y="8"  width="8" height="4" fill="#c47820"/>
      <rect x="68" y="32" width="8" height="4" fill="#c47820"/>
      <rect x="58" y="18" width="4" height="8" fill="#c47820"/>
      <rect x="82" y="18" width="4" height="8" fill="#c47820"/>
      <!-- pipe horizontal -->
      <rect x="0" y="62" width="100" height="8" fill="#5a3a18" rx="4"/>
      <rect x="0" y="64" width="100" height="2" fill="#7a5030"/>
      <!-- pipe vertical -->
      <rect x="60" y="0" width="8" height="60" fill="#5a3a18" rx="4"/>
      <rect x="62" y="0" width="2" height="60" fill="#7a5030"/>
      <!-- rivet -->
      <circle cx="20" cy="80" r="4" fill="#8b5e2a" stroke="#c47820" stroke-width="1"/>
      <circle cx="60" cy="80" r="4" fill="#8b5e2a" stroke="#c47820" stroke-width="1"/>
      <!-- steam puff -->
      <circle cx="82" cy="54" r="5" fill="#ccc" opacity="0.4"/>
      <circle cx="90" cy="50" r="4" fill="#ccc" opacity="0.3"/>
      <circle cx="86" cy="44" r="3" fill="#ccc" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="#2a1a08"/>
  <rect width="400" height="300" fill="url(#gears)"/>
</svg>
