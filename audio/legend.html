<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBA — Legendary Adventure</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080810;color:#d4af37;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;user-select:none}
    h1{font-size:14px;letter-spacing:3px;text-shadow:2px 2px 0 #6a5000}
    .subtitle{font-size:10px;color:#a07820;letter-spacing:2px}
    .controls{display:flex;gap:12px}
    button{background:#14100a;color:#d4af37;border:2px solid #d4af37;padding:10px 24px;font-family:'Courier New',monospace;font-size:12px;letter-spacing:1px;cursor:pointer;box-shadow:3px 3px 0 #000;transition:all .08s}
    button:hover{background:#d4af37;color:#080810;transform:translate(-1px,-1px);box-shadow:4px 4px 0 #000}
    button:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #000}
    #status{font-size:10px;color:#6a5000;letter-spacing:2px;min-height:16px}
    .info{font-size:9px;color:#3a3000;letter-spacing:1px;text-align:center;line-height:2}
  </style>
</head>
<body>
  <h1>⚔️ LEGENDARY ADVENTURE</h1>
  <p class="subtitle">TRACK 6 — ZELDA / EPIC RPG VIBES</p>
  <div class="controls">
    <button id="btn-play">▶  PLAY</button>
    <button id="btn-stop">■  STOP</button>
  </div>
  <div id="status">READY</div>
  <div class="info">120 BPM · A MINOR · 8 BARS<br>SQUARE LEAD + HARMONY · HEROIC MARCH DRUMS</div>
  <script>
  const AC = window.AudioContext || window.webkitAudioContext;
  let ctx = null, master = null, running = false, loopTimer = null;
  const BPM = 120, Q = 60/BPM, E = Q/2, S = Q/4, BARS = 8, LOOP = BARS*4*Q;

  function freq(n) {
    if (n==='R') return 0;
    const B={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
    const m=n.match(/^([A-G])([#b]?)(\d)$/); if(!m) return 0;
    return 440*Math.pow(2,(B[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0)+(parseInt(m[3])-4)*12-9)/12);
  }

  // A natural minor (A B C D E F G) — heroic, noble, Zelda-esque
  const LEAD = [
    ['A5',0.5],['B5',0.5],['C6',1],['B5',0.5],['A5',0.5],['E5',1],   // bar1 = 4
    ['F5',1],['G5',1],['A5',2],                                        // bar2 = 4
    ['G5',0.5],['A5',0.5],['B5',1],['G5',1],['E5',1],                 // bar3 = 4
    ['A5',4],                                                           // bar4 = 4
    ['C6',1],['B5',0.5],['A5',0.5],['G5',1],['F5',1],                 // bar5 = 4
    ['E5',0.5],['F5',0.5],['G5',1],['A5',1],['B5',1],                 // bar6 = 4
    ['C6',0.5],['B5',0.5],['A5',1],['G5',0.5],['F5',0.5],['E5',1],   // bar7 = 4
    ['A5',3],['R',1],                                                   // bar8 = 4
  ];
  // Harmony — a 3rd below the lead (creates Zelda-style 2-voice texture)
  const HARM = [
    ['F5',0.5],['G5',0.5],['A5',1],['G5',0.5],['F5',0.5],['C5',1],
    ['D5',1],['E5',1],['F5',2],
    ['E5',0.5],['F5',0.5],['G5',1],['E5',1],['C5',1],
    ['F5',4],
    ['A5',1],['G5',0.5],['F5',0.5],['E5',1],['D5',1],
    ['C5',0.5],['D5',0.5],['E5',1],['F5',1],['G5',1],
    ['A5',0.5],['G5',0.5],['F5',1],['E5',0.5],['D5',0.5],['C5',1],
    ['F5',3],['R',1],
  ];
  const BASS = [
    ['A2',2],['E3',2], ['F2',2],['C3',2],
    ['G2',2],['D3',2], ['A2',4],
    ['C3',2],['G3',2], ['F2',2],['A2',2],
    ['E2',2],['B2',2], ['A2',4],
  ];
  const ARP = [
    ['A3','C4','E4','C4'], ['F3','A3','C4','A3'],
    ['G3','B3','D4','B3'], ['A3','E4','A4','E4'],
    ['C4','E4','G4','E4'], ['F3','A3','C4','A3'],
    ['E3','G#3','B3','G#3'], ['A3','C4','E4','C4'], // E major chord for dramatic leading tone
  ];

  function playOsc(f, type, t0, dur, vol, detune) {
    if (!f) return;
    const g=ctx.createGain(), o=ctx.createOscillator();
    o.type=type; o.frequency.value=f; if(detune) o.detune.value=detune;
    o.connect(g); g.connect(master);
    const a=Math.min(0.008,dur*.05), r=Math.min(0.06,dur*.25);
    g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+a);
    g.gain.setValueAtTime(vol,t0+dur-r); g.gain.linearRampToValueAtTime(0,t0+dur);
    o.start(t0); o.stop(t0+dur+.02);
  }
  function playNoise(t0, rel, vol, ftype, ffreq, fQ) {
    const len=Math.ceil(ctx.sampleRate*.25);
    const buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(); src.buffer=buf;
    const filt=ctx.createBiquadFilter(); filt.type=ftype; filt.frequency.value=ffreq;
    if(fQ) filt.Q.value=fQ;
    const g=ctx.createGain(); src.connect(filt); filt.connect(g); g.connect(master);
    g.gain.setValueAtTime(vol,t0); g.gain.exponentialRampToValueAtTime(.001,t0+rel);
    src.start(t0); src.stop(t0+rel+.02);
  }

  function scheduleLoop(t0) {
    // Lead — square (heroic, classic chip)
    let t = t0;
    for (const [n,b] of LEAD) { const d=b*Q; playOsc(freq(n),'square',t,d*.82,.17); t+=d; }

    // Harmony — triangle (softer, blends under lead)
    t = t0;
    for (const [n,b] of HARM) { const d=b*Q; playOsc(freq(n),'triangle',t,d*.82,.10); t+=d; }

    // Arp — sawtooth (noble texture)
    t = t0;
    for (let bar=0;bar<BARS;bar++) {
      const ch=ARP[bar];
      for (let beat=0;beat<4;beat++)
        for (let s=0;s<4;s++) { playOsc(freq(ch[s%4]),'sawtooth',t,S*.5,.035); t+=S; }
    }

    // Bass — triangle (warm march)
    t = t0;
    for (const [n,b] of BASS) { const d=b*Q; playOsc(freq(n),'triangle',t,d*.9,.22); t+=d; }

    // Drums — heroic march
    t = t0;
    for (let i=0;i<BARS*8;i++) {
      const b8=i%8, barIdx=Math.floor(i/8), st=t+i*E;
      if(b8===0||b8===4) playNoise(st,E*.55,.28,'lowpass',150);        // kick
      if(b8===2||b8===6) playNoise(st,E*.45,.22,'bandpass',1500,0.7);  // snare
      playNoise(st,E*.2, b8%2===1?.10:.06,'highpass',6500);            // march hi-hat
      // Crash cymbal on bar 0 and bar 4 (loop start + halfway)
      if(b8===0 && (barIdx===0||barIdx===4)) playNoise(st, Q*1.5, .20, 'highpass', 3000);
    }

    const nextAt=t0+LOOP;
    loopTimer=setTimeout(()=>{ if(running) scheduleLoop(nextAt); },
      Math.max(50,(nextAt-ctx.currentTime)*1000-150));
  }

  function play() {
    if(running) return;
    ctx=new AC(); master=ctx.createGain(); master.gain.value=.52; master.connect(ctx.destination);
    running=true; setStatus('PLAYING ♪'); scheduleLoop(ctx.currentTime+.1);
  }
  function stop() {
    running=false; clearTimeout(loopTimer);
    if(ctx){ctx.close();ctx=null;master=null;} setStatus('STOPPED');
  }
  function setStatus(s){document.getElementById('status').textContent=s;}
  document.getElementById('btn-play').onclick=play;
  document.getElementById('btn-stop').onclick=stop;
  </script>
</body>
</html>
