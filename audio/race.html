<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBA — Race Track</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#1a0500;color:#ff6600;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;user-select:none}
    h1{font-size:14px;letter-spacing:3px;text-shadow:2px 2px 0 #6a2000}
    .subtitle{font-size:10px;color:#cc4400;letter-spacing:2px}
    .controls{display:flex;gap:12px}
    button{background:#2e0800;color:#ff6600;border:2px solid #ff6600;padding:10px 24px;font-family:'Courier New',monospace;font-size:12px;letter-spacing:1px;cursor:pointer;box-shadow:3px 3px 0 #000;transition:all .08s}
    button:hover{background:#ff6600;color:#1a0500;transform:translate(-1px,-1px);box-shadow:4px 4px 0 #000}
    button:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #000}
    #status{font-size:10px;color:#883300;letter-spacing:2px;min-height:16px}
    .info{font-size:9px;color:#5a2200;letter-spacing:1px;text-align:center;line-height:2}
  </style>
</head>
<body>
  <h1>🏎️ RACE TRACK</h1>
  <p class="subtitle">TRACK 4 — F-ZERO VIBES</p>
  <div class="controls">
    <button id="btn-play">▶  PLAY</button>
    <button id="btn-stop">■  STOP</button>
  </div>
  <div id="status">READY</div>
  <div class="info">185 BPM · E MINOR · 8 BARS<br>METALLIC SAW LEAD · ENGINE DRONE · 4-ON-FLOOR KICK</div>
  <script>
  const AC = window.AudioContext || window.webkitAudioContext;
  let ctx = null, master = null, running = false, loopTimer = null;
  const BPM = 185, Q = 60/BPM, E = Q/2, S = Q/4, BARS = 8, LOOP = BARS*4*Q;

  function freq(n) {
    if (n==='R') return 0;
    const B={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
    const m=n.match(/^([A-G])([#b]?)(\d)$/); if(!m) return 0;
    return 440*Math.pow(2,(B[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0)+(parseInt(m[3])-4)*12-9)/12);
  }

  // E minor — fast, punchy, metallic
  const LEAD = [
    ['E5',0.5],['G5',0.5],['A5',0.5],['B5',0.5],['E5',1],['B5',1],         // bar1 = 4
    ['A5',1],['B5',0.5],['A5',0.5],['G5',1],['E5',1],                       // bar2 = 4
    ['B5',0.5],['A5',0.5],['G5',1],['B5',0.5],['A5',0.5],['G5',1],         // bar3 = 4
    ['E5',2],['B4',1],['E5',1],                                             // bar4 = 4
    ['G5',0.5],['A5',0.5],['B5',1],['E6',1],['B5',1],                     // bar5 = 4
    ['A5',1],['G5',1],['E5',0.5],['G5',0.5],['A5',1],                     // bar6 = 4
    ['B5',0.5],['G5',0.5],['E5',0.5],['G5',0.5],['A5',1],['B5',1],       // bar7 = 4
    ['E5',2],['R',1],['E5',1],                                             // bar8 = 4
  ];
  const BASS = [
    ['E2',0.5],['E2',0.5],['E2',0.5],['E2',0.5],['E2',2],  // bar1: galloping E
    ['A2',4],                                                 // bar2
    ['G2',4],                                                 // bar3
    ['B2',4],                                                 // bar4
    ['E2',0.5],['E2',0.5],['E2',0.5],['E2',0.5],['E2',2],  // bar5: galloping E
    ['D2',4],                                                 // bar6
    ['A2',2],['G2',2],                                        // bar7
    ['E2',4],                                                 // bar8
  ];
  const ARP = [
    ['E4','G4','B4','G4'], ['A3','C4','E4','C4'],
    ['G3','B3','D4','B3'], ['B3','D4','F#4','D4'],
    ['E4','G4','B4','G4'], ['D4','F#4','A4','F#4'],
    ['A3','C4','E4','C4'], ['E4','G4','B4','G4'],
  ];

  function playOsc(f, type, t0, dur, vol, detune) {
    if (!f) return;
    const g=ctx.createGain(), o=ctx.createOscillator();
    o.type=type; o.frequency.value=f; if(detune) o.detune.value=detune;
    o.connect(g); g.connect(master);
    const a=Math.min(0.006,dur*.04), r=Math.min(0.04,dur*.2);
    g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+a);
    g.gain.setValueAtTime(vol,t0+dur-r); g.gain.linearRampToValueAtTime(0,t0+dur);
    o.start(t0); o.stop(t0+dur+.02);
  }
  function playNoise(t0, rel, vol, ftype, ffreq, fQ) {
    const len=Math.ceil(ctx.sampleRate*.2);
    const buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(); src.buffer=buf;
    const filt=ctx.createBiquadFilter(); filt.type=ftype; filt.frequency.value=ffreq;
    if(fQ) filt.Q.value=fQ;
    const g=ctx.createGain(); src.connect(filt); filt.connect(g); g.connect(master);
    g.gain.setValueAtTime(vol,t0); g.gain.exponentialRampToValueAtTime(.001,t0+rel);
    src.start(t0); src.stop(t0+rel+.02);
  }

  function scheduleLoop(t0) {
    // Engine drone — low detuned sawtooth pair for the entire loop
    playOsc(freq('E1'), 'sawtooth', t0, LOOP, .06);
    playOsc(freq('E1'), 'sawtooth', t0, LOOP, .04, 15); // slight detune = "engine growl"

    // Lead — sawtooth (metallic, aggressive)
    let t = t0;
    for (const [n,b] of LEAD) { const d=b*Q; playOsc(freq(n),'sawtooth',t,d*.78,.19); t+=d; }

    // Arp — square power chords (crunch)
    t = t0;
    for (let bar=0;bar<BARS;bar++) {
      const ch=ARP[bar];
      for (let beat=0;beat<4;beat++)
        for (let s=0;s<4;s++) { playOsc(freq(ch[s%4]),'square',t,S*.5,.05); t+=S; }
    }

    // Bass — heavy square
    t = t0;
    for (const [n,b] of BASS) { const d=b*Q; playOsc(freq(n),'square',t,d*.88,.26); t+=d; }

    // Drums — four-on-the-floor + heavy snare
    t = t0;
    for (let i=0;i<BARS*8;i++) {
      const b8=i%8, st=t+i*E;
      if(b8===0||b8===2||b8===4||b8===6) playNoise(st,E*.55,.33,'lowpass',150); // 4-on-floor kick
      if(b8===2||b8===6)                 playNoise(st,E*.45,.26,'bandpass',1600,0.8); // snare on 2,4
      playNoise(st,E*.15,b8%2===1?.12:.07,'highpass',6000); // hi-hat (offbeat accent)
      // Metal clang on beat 3 (b8===4) — sharp noise spike
      if(b8===4) playNoise(st,S*.3,.18,'bandpass',3500,3);
    }

    const nextAt=t0+LOOP;
    loopTimer=setTimeout(()=>{ if(running) scheduleLoop(nextAt); },
      Math.max(50,(nextAt-ctx.currentTime)*1000-150));
  }

  function play() {
    if(running) return;
    ctx=new AC(); master=ctx.createGain(); master.gain.value=.50; master.connect(ctx.destination);
    running=true; setStatus('PLAYING ♪'); scheduleLoop(ctx.currentTime+.1);
  }
  function stop() {
    running=false; clearTimeout(loopTimer);
    if(ctx){ctx.close();ctx=null;master=null;} setStatus('STOPPED');
  }
  function setStatus(s){document.getElementById('status').textContent=s;}
  document.getElementById('btn-play').onclick=play;
  document.getElementById('btn-stop').onclick=stop;
  </script>
</body>
</html>
